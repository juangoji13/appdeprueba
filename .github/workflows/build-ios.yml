name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App without Signing
        run: |
          xcodebuild archive \
            -workspace ios/MiAppPrueba.xcworkspace \
            -scheme MiAppPrueba \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/MiAppPrueba.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app to .ipa
        run: |
          mkdir -p Payload
          cp -r build/MiAppPrueba.xcarchive/Products/Applications/*.app Payload/
          zip -r miappprueba.ipa Payload
          echo "IPA created successfully."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: miappprueba-ios
          path: miappprueba.ipa
