name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios

      - name: Build iOS App without Signing
        run: |
          cd ios
          # The workspace name usually matches the app name from app.json
          xcodebuild \
            -workspace MiAppPrueba.xcworkspace \
            -scheme MiAppPrueba \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath Build/ \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app to .ipa
        run: |
          # Find the .app file generated
          APP_PATH=$(find ios/Build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create Payload directory
          mkdir -p Payload
          
          # Copy .app to Payload
          cp -r "$APP_PATH" Payload/
          
          # Zip Payload to .ipa
          zip -r miappprueba.ipa Payload
          
          echo "IPA created successfully."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: miappprueba-ios
          path: miappprueba.ipa
